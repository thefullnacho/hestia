<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<!-- iOS: launch fullscreen + a real status bar when added to the Home Screen (no service
     worker needed — this is the "bookmark that feels like an app" path). -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Hestia">
<meta name="theme-color" content="#0e0f13">
<link rel="apple-touch-icon" href="/icon.png">
<link rel="icon" type="image/png" href="/icon.png">
<title>Hestia</title>
<style>
  :root {
    --bg: #0e0f13; --panel: #16181f; --line: #232631; --text: #e8eaf0;
    --muted: #8b90a0; --me: #2a6df4; --you: #1d2029; --accent: #d98a4b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; overflow-x: hidden; }
  body {
    background: var(--bg); color: var(--text); display: flex; flex-direction: column;
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    /* respect the iPhone notch / home indicator */
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  header {
    display: flex; align-items: center; gap: 10px; padding: 12px 16px;
    border-bottom: 1px solid var(--line); background: var(--panel);
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--muted); transition: background .3s; }
  header .dot.ok { background: #3ecf8e; } header .dot.err { background: #f0556a; }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header h1 span { color: var(--accent); }
  header .spacer { flex: 1; }
  header button {
    background: none; border: 1px solid var(--line); color: var(--muted);
    border-radius: 8px; padding: 6px 10px; font-size: 13px;
  }
  #log { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 82%; padding: 10px 14px; border-radius: 16px; white-space: pre-wrap; word-wrap: break-word; }
  .msg.me { align-self: flex-end; background: var(--me); border-bottom-right-radius: 4px; }
  .msg.you { align-self: flex-start; background: var(--you); border: 1px solid var(--line); border-bottom-left-radius: 4px; }
  .msg.err { align-self: center; background: #2a1a1d; border: 1px solid #4a2630; color: #f0a9b4; font-size: 14px; }
  .msg.you.pending { color: var(--muted); font-style: italic; }
  .empty { color: var(--muted); text-align: center; margin: auto; padding: 24px; }
  footer { border-top: 1px solid var(--line); background: var(--panel); padding: 10px 12px; display: flex; gap: 8px; }
  #box {
    flex: 1; resize: none; max-height: 140px; background: var(--bg); color: var(--text);
    border: 1px solid var(--line); border-radius: 12px; padding: 11px 14px; font: inherit;
  }
  #box:focus { outline: none; border-color: var(--me); }
  #send { background: var(--me); color: #fff; border: none; border-radius: 12px; padding: 0 18px; font-weight: 600; }
  #send:disabled { opacity: .5; }
  /* Tap-to-talk mic: tap to record, tap again to stop. Turns red + pulses while listening. */
  #mic { background: var(--you); color: var(--text); border: 1px solid var(--line); border-radius: 12px; width: 46px; font-size: 19px; flex: none; }
  #mic.rec { background: #f0556a; color: #fff; border-color: #f0556a; animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }

  /* --- Status panel (full-screen overlay over the chat; same data as the `status` tool) --- */
  #status {
    position: fixed; inset: 0; z-index: 20; background: var(--bg);
    display: none; flex-direction: column; overflow: hidden;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  #status.open { display: flex; }
  .status-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--line); background: var(--panel); }
  .status-head h1 { font-size: 16px; margin: 0; font-weight: 600; }
  .status-head .spacer { flex: 1; }
  .status-head button { background: none; border: 1px solid var(--line); color: var(--muted); border-radius: 8px; padding: 6px 10px; font-size: 13px; }
  .status-body { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 16px; display: flex; flex-direction: column; gap: 18px; }
  .s-headline { font-weight: 600; font-size: 15px; }
  .s-headline.ok { color: #3ecf8e; } .s-headline.bad { color: #f0556a; }
  .s-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 9px; }
  .pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { padding: 5px 11px; border-radius: 999px; font-size: 13px; border: 1px solid var(--line); display: flex; align-items: center; gap: 7px; }
  .pill .pdot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .pill.up { color: #bfe9d4; } .pill.up .pdot { background: #3ecf8e; }
  .pill.down { color: #f0a9b4; border-color: #4a2630; background: #2a1a1d; } .pill.down .pdot { background: #f0556a; }
  .pill .sub { color: var(--muted); }
  .metric { display: flex; justify-content: space-between; font-size: 14px; }
  .metric .k { color: var(--muted); }
  .bar { height: 6px; background: var(--you); border-radius: 4px; overflow: hidden; margin-top: 5px; }
  .bar > i { display: block; height: 100%; background: var(--accent); transition: width .3s; }
  .bar.warn > i { background: #e0a23c; } .bar.crit > i { background: #f0556a; }
  .row { padding: 5px 0; }
  .gpu { margin-bottom: 12px; }
  .gpu .glabel { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; }
  /* let the GPU name ellipsize so the long mem/util/temp readout never forces a sideways scroll */
  .gpu .glabel > span:first-child { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .gpu .glabel .sub { color: var(--muted); white-space: nowrap; }
  .s-foot { color: var(--muted); font-size: 12px; text-align: center; padding: 4px 0 8px; }
</style>
</head>
<body>
  <header>
    <span class="dot" id="dot"></span>
    <h1><span>H</span>estia</h1>
    <span class="spacer"></span>
    <button id="statusBtn">Status</button>
    <button id="clear">New chat</button>
  </header>
  <div id="log"></div>
  <footer>
    <textarea id="box" rows="1" placeholder="Message Hestia…" autocomplete="off"></textarea>
    <button id="mic" aria-label="Talk to Hestia" title="Tap to talk, tap to stop">🎙</button>
    <button id="send">Send</button>
  </footer>

  <!-- Status overlay — at-a-glance health, fed by GET /status (the same snapshot the
       `status` brain tool speaks). Opened from the header; auto-refreshes while open. -->
  <div id="status">
    <div class="status-head">
      <h1>Status</h1>
      <span class="spacer"></span>
      <button id="statusRefresh">Refresh</button>
      <button id="statusClose">Done</button>
    </div>
    <div class="status-body" id="statusBody">
      <div class="empty">Loading…</div>
    </div>
  </div>

<script>
// Talks to the brain at the SAME origin this page is served from (the brain serves it at
// /app), so there's no base URL to configure and no CORS. History lives in localStorage —
// it survives reloads and is sent back each turn, so the conversation is genuinely multi-turn
// (the brain's /v1 already uses the full message array; HA's Assist box was the lossy part).
const KEY = "hestia.chat.v1";
const MAX_SEND = 20;                       // cap the history tail sent to the brain
const log = document.getElementById("log");
const box = document.getElementById("box");
const send = document.getElementById("send");
const dot = document.getElementById("dot");

let messages = load();
render();
health();

function load() {
  try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
}
function save() { localStorage.setItem(KEY, JSON.stringify(messages)); }

function render() {
  log.innerHTML = "";
  if (!messages.length) {
    const e = document.createElement("div");
    e.className = "empty";
    e.textContent = "Ask about the house, the garden, the media library, or anything else.";
    log.appendChild(e);
    return;
  }
  for (const m of messages) bubble(m.role === "user" ? "me" : "you", m.content);
  log.scrollTop = log.scrollHeight;
}

function bubble(cls, text) {
  const d = document.createElement("div");
  d.className = "msg " + cls;
  d.textContent = text;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  return d;
}

async function health() {
  try {
    const r = await fetch("health");
    dot.className = "dot " + (r.ok ? "ok" : "err");
  } catch { dot.className = "dot err"; }
}

async function submit(viaVoice = false) {
  const text = box.value.trim();
  if (!text) return;
  box.value = ""; box.style.height = "auto";
  messages.push({ role: "user", content: text });
  bubble("me", text); save();

  send.disabled = true;
  const pending = bubble("you", "Hestia is thinking…");
  pending.classList.add("pending");

  try {
    const r = await fetch("v1/chat/completions", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      // only user/assistant turns; the brain injects its own system prompt and ignores ours
      body: JSON.stringify({ messages: messages.slice(-MAX_SEND) }),
    });
    if (!r.ok) throw new Error("brain returned " + r.status);
    const data = await r.json();
    const reply = (data.choices?.[0]?.message?.content || "").trim() || "(empty reply)";
    pending.remove();
    messages.push({ role: "assistant", content: reply });
    bubble("you", reply); save();
    dot.className = "dot ok";
    if (viaVoice) speak(reply);   // spoke to her -> she speaks back (text turns stay silent)
  } catch (e) {
    pending.remove();
    bubble("err", "Couldn't reach Hestia — " + e.message + ". Is the brain up and are you on the tailnet?");
    dot.className = "dot err";
  } finally {
    send.disabled = false;
    box.focus();
  }
}

send.addEventListener("click", submit);
box.addEventListener("keydown", (e) => {
  // Enter sends; Shift+Enter newlines. (On phones the on-screen Return key inserts a newline.)
  if (e.key === "Enter" && !e.shiftKey && !e.isComposing) { e.preventDefault(); submit(); }
});
box.addEventListener("input", () => {           // grow with content
  box.style.height = "auto";
  box.style.height = Math.min(box.scrollHeight, 140) + "px";
});
document.getElementById("clear").addEventListener("click", () => {
  if (messages.length && !confirm("Clear this conversation?")) return;
  messages = []; save(); render();
});

// --- Voice: tap the mic to record, tap again to stop. The clip goes to the brain's STT proxy
// (/v1/audio/transcriptions -> Wyoming whisper), the transcript is sent as a normal turn, and
// the reply is spoken back via the TTS proxy (/v1/audio/speech -> piper). getUserMedia needs a
// secure context, so over plain http the API is absent and we point the user at the https:// URL. ---
const mic = document.getElementById("mic");
let recorder = null, chunks = [], recording = false;
let ttsAudio = null;   // one reused <audio>, unlocked on the tap, so iOS lets replies autoplay

async function toggleMic() {
  if (recording) { recorder.stop(); return; }
  if (!navigator.mediaDevices?.getUserMedia) {
    bubble("err", "Mic needs a secure connection — open Hestia over the Tailscale https:// address, not the raw IP.");
    return;
  }
  if (!ttsAudio) ttsAudio = new Audio();   // created inside the gesture = allowed to play later
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recorder = new MediaRecorder(stream);
    chunks = [];
    recorder.ondataavailable = (e) => { if (e.data.size) chunks.push(e.data); };
    recorder.onstop = () => {
      recording = false; mic.classList.remove("rec");
      stream.getTracks().forEach((t) => t.stop());
      transcribeAndSend(new Blob(chunks, { type: recorder.mimeType || "audio/webm" }));
    };
    recorder.start();
    recording = true; mic.classList.add("rec");
  } catch (e) {
    bubble("err", "Couldn't access the mic — " + e.message);
  }
}

async function transcribeAndSend(blob) {
  const pending = bubble("you", "Listening…"); pending.classList.add("pending");
  try {
    const fd = new FormData();
    fd.append("file", blob, "clip.webm");          // ffmpeg sniffs the real container server-side
    const r = await fetch("v1/audio/transcriptions", { method: "POST", body: fd });
    if (!r.ok) throw new Error("STT " + r.status);
    const text = ((await r.json()).text || "").trim();
    pending.remove();
    if (!text) { bubble("err", "Didn't catch that — try again, a bit closer to the mic."); return; }
    box.value = text;
    submit(true);                                   // send it AND speak the reply
  } catch (e) {
    pending.remove();
    bubble("err", "Transcription failed — " + e.message + ". Is the STT service up?");
  }
}

async function speak(text) {
  if (!ttsAudio) return;
  try {
    const r = await fetch("v1/audio/speech", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ input: text }),
    });
    if (!r.ok) return;
    const url = URL.createObjectURL(await r.blob());
    ttsAudio.src = url;
    ttsAudio.onended = () => URL.revokeObjectURL(url);
    ttsAudio.play().catch(() => {});                // if autoplay is blocked, the reply is still on screen
  } catch { /* speaking is best-effort; never block the text reply */ }
}

mic.addEventListener("click", toggleMic);

// --- Status panel: the visual half of the `status` tool. Same /status snapshot, rendered as
// pills + bars. Auto-refreshes every 15s while open; stops polling when closed. ---
const statusEl = document.getElementById("status");
const statusBody = document.getElementById("statusBody");
let statusTimer = null;

function esc(s) {
  return String(s).replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
}
function clamp(n) { return Math.max(0, Math.min(100, Math.round(n))); }
function barClass(v, warn, crit) { return v >= crit ? "bar crit" : v >= warn ? "bar warn" : "bar"; }
function bar(label, v, warn, crit) {
  v = clamp(v);
  return '<div class="row"><div class="metric"><span class="k">' + esc(label) + "</span><span>" + v +
    '%</span></div><div class="' + barClass(v, warn, crit) + '"><i style="width:' + v + '%"></i></div></div>';
}

function renderStatus(s) {
  const down = s.services.filter(x => !x.up).map(x => x.name);
  if (!s.brain.ollama_up) down.push("Ollama");
  const ok = down.length === 0;
  let h = '<div class="s-headline ' + (ok ? "ok" : "bad") + '">' +
    (ok ? "All systems nominal" : down.length + " issue" + (down.length > 1 ? "s" : "") + " — " + esc(down.join(", ")) + " down") + "</div>";

  h += '<div class="s-section"><h2>Services</h2><div class="pills">';
  for (const x of s.services) {
    h += '<span class="pill ' + (x.up ? "up" : "down") + '"><span class="pdot"></span>' + esc(x.name) +
      (x.detail ? ' <span class="sub">' + esc(x.detail) + "</span>" : "") + "</span>";
  }
  h += "</div></div>";

  const b = s.brain;
  h += '<div class="s-section"><h2>Brain</h2><div class="pills">';
  h += '<span class="pill ' + (b.ollama_up ? "up" : "down") + '"><span class="pdot"></span>Ollama' +
    (b.version ? ' <span class="sub">' + esc(b.version) + "</span>" : "") + "</span>";
  h += '<span class="pill ' + (b.resident ? "up" : "down") + '"><span class="pdot"></span>' + esc(b.model) +
    ' <span class="sub">' + (b.resident ? "loaded" : "not loaded") + "</span></span>";
  h += "</div></div>";

  if (s.gpus && s.gpus.length) {
    h += '<div class="s-section"><h2>GPU</h2>';
    for (const g of s.gpus) {
      const memPct = clamp(100 * g.mem_used_gb / g.mem_total_gb);
      h += '<div class="gpu"><div class="glabel"><span>GPU' + g.index + " " + esc(g.name.replace("NVIDIA GeForce ", "")) +
        '</span><span class="sub">' + g.mem_used_gb + "/" + g.mem_total_gb + " GB · " + g.util_pct + "% · " + g.temp_c +
        '°C</span></div><div class="' + barClass(memPct, 70, 90) + '"><i style="width:' + memPct + '%"></i></div></div>';
    }
    h += "</div>";
  }

  const sy = s.system;
  h += '<div class="s-section"><h2>Brain box</h2>';
  if (sy.load1 != null) h += '<div class="row metric"><span class="k">Load</span><span>' + esc(sy.load1) + " / " + esc(sy.cpus) + " cores</span></div>";
  if (sy.mem_pct != null) h += bar("RAM", sy.mem_pct, 80, 92);
  // Swap is the meltdown early-warning signal — warn early (20%), crit at 50%.
  h += bar("Swap" + (sy.swap_used_gb ? " (" + sy.swap_used_gb + " GB)" : ""), sy.swap_pct || 0, 20, 50);
  if (sy.disk_pct != null) h += bar("Disk", sy.disk_pct, 85, 95);
  h += "</div>";

  h += '<div class="s-section"><h2>Downloads</h2><div class="metric"><span class="k">Active</span><span>' +
    (s.downloads.active || 0) + "</span></div></div>";

  h += '<div class="s-foot">Updated ' + new Date().toLocaleTimeString() + "</div>";
  statusBody.innerHTML = h;
}

async function refreshStatus() {
  try {
    const r = await fetch("status");
    if (!r.ok) throw new Error("status " + r.status);
    renderStatus(await r.json());
  } catch (e) {
    statusBody.innerHTML = '<div class="empty">Couldn\'t load status — ' + esc(e.message) +
      ". Is the brain up and are you on the tailnet?</div>";
  }
}
function openStatus() {
  statusEl.classList.add("open");
  refreshStatus();
  statusTimer = setInterval(refreshStatus, 15000);
}
function closeStatus() {
  statusEl.classList.remove("open");
  if (statusTimer) { clearInterval(statusTimer); statusTimer = null; }
}
document.getElementById("statusBtn").addEventListener("click", openStatus);
document.getElementById("statusClose").addEventListener("click", closeStatus);
document.getElementById("statusRefresh").addEventListener("click", refreshStatus);
// Deep link: /app#status opens straight to the dashboard (handy as a separate phone shortcut).
if (location.hash === "#status") openStatus();
</script>
</body>
</html>
